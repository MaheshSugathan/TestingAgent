version: '3.8'

services:
  rag-evaluation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-evaluation-api
    ports:
      - "8080:8080"
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - PORT=8080
      - HOST=0.0.0.0
      # AWS Configuration (optional - can be set via .env file)
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      # AgentCore Configuration
      - AGENTCORE_ENABLED=${AGENTCORE_ENABLED:-true}
      - AGENTCORE_BASE_URL=${AGENTCORE_BASE_URL:-http://localhost:8000}
      - AGENTCORE_BILL_AGENT_NAME=${AGENTCORE_BILL_AGENT_NAME:-bill}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount config if you want to modify without rebuilding
      - ./config:/app/config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

